<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>
    <div class="reel-info">
      <p id="user-id">boolean.careers</p>
      <p id="description">Prova il Fundamentals Camp. 20 ore di corso gratuito per...<span style="font-weight: 800;">Vedi altro</span></p>
    </div>


    <!-- Header -->
    <header class="reel-header">
      <i class="bi bi-play-btn"></i>
      <!-- Div annidato per posizione dei 3 pulsanti -->
      <div class="top-nav">
        <span id="Explore">Esplora</span>
        <span id="Followed">Seguiti</span>
        <span>P<span id="FY">er t</span>e</span> <!-- created annidated span for the border / underline -->
      </div>
      <i class="bi bi-search"></i>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <img id="user-pic" src="./assets/img/boolean_logo.png" alt="user-pic">
      <div class="likes">
        <i class="bi bi-heart-fill"></i>
        <p id="number-likes">588</p>
      </div>
      <div class="messages">
        <i class="bi bi-chat-dots-fill"></i>
        <p id="number-dms">13</p>
      </div>
      <div class="saves">
        <i class="bi bi-bookmark-fill"></i>
        <p id="number-saves">638</p>
      </div>
      <div class="sends">
        <i class="bi bi-diamond-fill"></i>
        <i class="bi bi-arrow-90deg-right" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%) scale(0.5); color: #004d80;">
        </i>
        <p id="number-sends">491</p>
      </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="home-button">
          <i class="bi bi-house-fill"></i>
          <p>Home</p>
        </div>

        <div class="friends-button">
        <i class="bi bi-people"></i>  
        <p>Amici</p>
        </div>

        <div class="add-button">
          <p id="add-button">&plus;</p>
        </div>

        <div class="messages-button">
        <i class="bi bi-chat-square"></i>
        <p>Posta in arrivo</p>
        </div>

        <div class="profile-button">
        <i class="bi bi-person"></i>
        <p>Profilo</p>
        </div>
    </footer>
  </div>

</body>

</html>
